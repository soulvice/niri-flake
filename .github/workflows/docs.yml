name: Generate Documentation

on:
  push:
    branches: [ main, master ]
    paths:
      - 'generator/**'
      - 'docs/**'
      - 'examples/**'
      - 'flake.nix'
      - 'generate-docs.nix'
      - '.github/workflows/docs.yml'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'generator/**'
      - 'docs/**'
      - 'examples/**'
      - 'flake.nix'
      - 'generate-docs.nix'
      - '.github/workflows/docs.yml'
  workflow_dispatch:
    inputs:
      update_docs:
        description: 'Force documentation update'
        required: false
        default: true
        type: boolean

permissions:
  contents: write

env:
  NIRI_REPO: soulvice/niri

jobs:
  generate-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Setup Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Get niri version info
        id: niri-info
        run: |
          # Get current niri commit from flake.nix
          CURRENT_COMMIT=""
          if grep -q "rev.*=" flake.nix; then
            CURRENT_COMMIT=$(grep "rev.*=" flake.nix | sed -n 's/.*rev = "\([^"]*\)".*/\1/p')
          fi

          # Get current sha256 from flake.nix
          CURRENT_SHA256=""
          if grep -q "sha256.*=" flake.nix; then
            CURRENT_SHA256=$(grep "sha256.*=" flake.nix | sed -n 's/.*sha256 = "\([^"]*\)".*/\1/p')
          fi

          # Get latest commit info from GitHub API
          LATEST_COMMIT=$(curl -s "https://api.github.com/repos/$NIRI_REPO/commits/main" | jq -r '.sha')
          LATEST_COMMIT_DATE=$(curl -s "https://api.github.com/repos/$NIRI_REPO/commits/main" | jq -r '.commit.committer.date')
          LATEST_COMMIT_MESSAGE=$(curl -s "https://api.github.com/repos/$NIRI_REPO/commits/main" | jq -r '.commit.message' | head -n1)

          echo "current_commit=$CURRENT_COMMIT" >> $GITHUB_OUTPUT
          echo "current_sha256=$CURRENT_SHA256" >> $GITHUB_OUTPUT
          echo "latest_commit=$LATEST_COMMIT" >> $GITHUB_OUTPUT
          echo "latest_commit_date=$LATEST_COMMIT_DATE" >> $GITHUB_OUTPUT
          echo "latest_commit_message=$LATEST_COMMIT_MESSAGE" >> $GITHUB_OUTPUT

          echo "Current niri commit: $CURRENT_COMMIT"
          echo "Latest niri commit: $LATEST_COMMIT"

      - name: Generate comprehensive documentation
        run: |
          echo "Generating comprehensive documentation..."

          # Build comprehensive documentation with niri info
          nix build -f generate-docs.nix --show-trace

          # Copy to docs directory
          mkdir -p docs
          cp result/MODULE_OPTIONS.md docs/

      - name: Add niri version information to documentation
        run: |
          # Create niri version info section
          cat >> docs/MODULE_OPTIONS.md << 'EOF'

          ---

          ## Niri Version Information

          This module is generated from the niri Wayland compositor source code to ensure complete compatibility and feature coverage.

          ### Current Integration

          **Niri Commit:** [`${{ steps.niri-info.outputs.current_commit }}`](https://github.com/${{ env.NIRI_REPO }}/commit/${{ steps.niri-info.outputs.current_commit }})
          **Commit Message:** ${{ steps.niri-info.outputs.latest_commit_message }}
          **Integration SHA256:** `${{ steps.niri-info.outputs.current_sha256 }}`

          ### Latest Niri Development

          **Latest Commit:** [`${{ steps.niri-info.outputs.latest_commit }}`](https://github.com/${{ env.NIRI_REPO }}/commit/${{ steps.niri-info.outputs.latest_commit }})
          **Commit Date:** ${{ steps.niri-info.outputs.latest_commit_date }}

          ### Automatic Updates

          This module is automatically updated when new niri commits are available. The GitHub Actions workflow:
          - Monitors the [niri repository](https://github.com/${{ env.NIRI_REPO }}) for changes
          - Automatically regenerates the module when new commits are detected
          - Updates documentation and examples
          - Creates pull requests for review and integration

          ### Version Compatibility

          | Component | Version |
          |-----------|---------|
          | Niri Source | [`${{ steps.niri-info.outputs.current_commit }}`](https://github.com/${{ env.NIRI_REPO }}/commit/${{ steps.niri-info.outputs.current_commit }}) |
          | Module Generated | $(date -u +'%Y-%m-%d %H:%M:%S UTC') |
          | Documentation | $(date -u +'%Y-%m-%d %H:%M:%S UTC') |

          EOF

      - name: Generate options JSON
        run: |
          # Generate machine-readable options
          echo "Generating options.json..."
          nix eval .#niri-module.options --json > docs/options.json 2>/dev/null || echo "{}" > docs/options.json

      - name: Create documentation summary
        run: |
          echo "📖 Documentation Summary" > docs/GENERATION_LOG.md
          echo "========================" >> docs/GENERATION_LOG.md
          echo "" >> docs/GENERATION_LOG.md
          echo "**Generated:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> docs/GENERATION_LOG.md
          echo "**Niri Commit:** ${{ steps.niri-info.outputs.current_commit }}" >> docs/GENERATION_LOG.md
          echo "**Trigger:** ${{ github.event_name }}" >> docs/GENERATION_LOG.md
          echo "" >> docs/GENERATION_LOG.md
          echo "## Generated Files" >> docs/GENERATION_LOG.md
          echo "" >> docs/GENERATION_LOG.md
          echo "- \`docs/MODULE_OPTIONS.md\` - Complete module documentation" >> docs/GENERATION_LOG.md
          echo "- \`docs/options.json\` - Machine-readable options schema" >> docs/GENERATION_LOG.md
          echo "- \`docs/GENERATION_LOG.md\` - This generation log" >> docs/GENERATION_LOG.md

      - name: Commit documentation changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions Documentation Bot"

          # Add generated documentation
          git add docs/MODULE_OPTIONS.md docs/options.json docs/GENERATION_LOG.md

          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "No documentation changes to commit"
            exit 0
          fi

          # Commit the changes
          git commit -m "docs: update module documentation

          - Generated from niri commit ${{ steps.niri-info.outputs.current_commit }}
          - Updated MODULE_OPTIONS.md with latest options
          - Updated options.json schema
          - Added niri version information

          Auto-generated by GitHub Actions"

          git push origin ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  validate-docs:
    needs: generate-docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Setup Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Validate generated documentation
        run: |
          # Check that documentation files exist and are valid
          echo "Validating documentation..."

          if [[ ! -f "docs/MODULE_OPTIONS.md" ]]; then
            echo "❌ MODULE_OPTIONS.md not found"
            exit 1
          fi

          if [[ ! -f "docs/options.json" ]]; then
            echo "❌ options.json not found"
            exit 1
          fi

          # Validate JSON syntax
          if ! jq empty docs/options.json; then
            echo "❌ options.json is invalid JSON"
            exit 1
          fi

          # Check that markdown contains expected sections
          required_sections=("Overview" "Installation" "Module Options" "Actions Library")
          for section in "${required_sections[@]}"; do
            if ! grep -q "## $section" docs/MODULE_OPTIONS.md; then
              echo "❌ Missing required section: $section"
              exit 1
            fi
          done

          echo "✅ Documentation validation passed"

      - name: Check documentation size
        run: |
          # Ensure documentation is comprehensive
          md_size=$(wc -l < docs/MODULE_OPTIONS.md)
          json_size=$(wc -c < docs/options.json)

          echo "Documentation metrics:"
          echo "  MODULE_OPTIONS.md: $md_size lines"
          echo "  options.json: $json_size bytes"

          # Basic sanity checks
          if [[ $md_size -lt 100 ]]; then
            echo "⚠️  Warning: Documentation seems too short ($md_size lines)"
          fi

          if [[ $json_size -lt 10 ]]; then
            echo "⚠️  Warning: options.json seems too small ($json_size bytes)"
          fi