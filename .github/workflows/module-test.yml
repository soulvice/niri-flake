name: Test Module

on:
  push:
    branches: [ main, master, develop ]
    paths:
      - 'generator/**'
      - 'module/**'
      - 'examples/**'
      - 'test/**'
      - 'flake.nix'
      - '.github/workflows/module-test.yml'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'generator/**'
      - 'module/**'
      - 'examples/**'
      - 'test/**'
      - 'flake.nix'
      - '.github/workflows/module-test.yml'
  workflow_dispatch:
    inputs:
      test_examples:
        description: 'Test all example configurations'
        required: false
        default: true
        type: boolean

permissions:
  contents: read

jobs:
  test-generation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Setup Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Test module generation
        run: |
          echo "Testing module generation pipeline..."

          # Test generator components
          echo "Building parser..."
          nix build .#lib.niri-generator.parser --show-trace

          echo "Building type mapper..."
          nix build .#lib.niri-generator.typeMapper --show-trace

          echo "Building KDL generator..."
          nix build .#lib.niri-generator.kdlGenerator --show-trace

          echo "Building module generator..."
          nix build .#lib.niri-generator.moduleGenerator --show-trace

          echo "Building documentation generator..."
          nix build .#lib.niri-generator.docsGenerator --show-trace

          echo "✅ All generator components build successfully"

      - name: Test niri module
        run: |
          echo "Testing niri home-manager module..."

          # Build the module
          nix build .#niri-module --show-trace

          # Test module evaluation
          nix eval .#homeManagerModules.niri --show-trace

          echo "✅ Module tests passed"

  test-examples:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        example:
          - basic-config
          - advanced-config
          - extraconfig-examples
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Setup Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Test example configuration - ${{ matrix.example }}
        run: |
          example_file="examples/${{ matrix.example }}.nix"

          if [[ ! -f "$example_file" ]]; then
            echo "❌ Example file not found: $example_file"
            exit 1
          fi

          echo "Testing example: ${{ matrix.example }}"
          echo "File: $example_file"

          # Test that the example can be evaluated
          nix eval --file "$example_file" --show-trace

          echo "✅ Example ${{ matrix.example }} evaluation passed"

      - name: Test example with home-manager
        run: |
          # Create a test home-manager configuration using the example
          cat > test-home-config.nix << EOF
          { config, pkgs, ... }:

          let
            niri-flake = import ./flake.nix;
            example = import ./examples/${{ matrix.example }}.nix;
          in
          {
            imports = [
              niri-flake.outputs.homeManagerModules.niri
            ];

            home.username = "testuser";
            home.homeDirectory = "/home/testuser";
            home.stateVersion = "23.11";

            programs.home-manager.enable = true;

            # Import the example configuration
            programs.niri = example.programs.niri or {};
          }
          EOF

          echo "Testing example ${{ matrix.example }} with home-manager..."

          # Test home-manager configuration evaluation
          nix eval --file test-home-config.nix --show-trace

          echo "✅ Example ${{ matrix.example }} home-manager test passed"

  test-complex-configs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Setup Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Test complex configuration scenarios
        run: |
          echo "Testing complex configuration scenarios..."

          # Test complex multi-config example if it exists
          if [[ -f "test/complex-config-examples.nix" ]]; then
            echo "Testing complex configurations..."
            nix eval --file test/complex-config-examples.nix --show-trace
          fi

          # Test configuration with all major sections
          cat > test-comprehensive-config.nix << 'EOF'
          { config, pkgs, ... }:
          {
            programs.niri = {
              enable = true;
              settings = {
                input = {
                  keyboard = {
                    xkb = {
                      layout = "us";
                      options = "caps:escape";
                    };
                    repeat_delay = 400;
                    repeat_rate = 30;
                  };
                  touchpad = {
                    tap = true;
                    natural_scroll = true;
                    accel_profile = "adaptive";
                  };
                  mouse = {
                    accel_profile = "flat";
                    accel_speed = -0.2;
                  };
                };

                layout = {
                  gaps = 12;
                  center_focused_column = "on-overflow";
                  focus_ring = {
                    enable = true;
                    width = 2;
                    active_color = "#00ff00";
                  };
                  border = {
                    enable = false;
                    width = 1;
                  };
                };

                binds = with config.lib.niri.actions; {
                  "Mod+Return".action = spawn "foot";
                  "Mod+Q".action = close_window;
                  "Mod+F".action = fullscreen_window;
                  "Mod+Space".action = toggle_overview;
                };

                outputs = [
                  {
                    name = "DP-1";
                    scale = 1.0;
                    position = { x = 0; y = 0; };
                    mode = { width = 1920; height = 1080; refresh_rate = 144.0; };
                  }
                ];

                window_rules = [
                  {
                    matches = [{ app_id = "firefox"; }];
                    open_on_workspace = "browser";
                  }
                ];

                spawn_at_startup = [ "waybar" "mako" ];

                animations = {
                  slowdown = 1.0;
                  workspace_switch = {};
                };
              };

              extraConfig = ''
                // Test extra config
                debug {
                  render-drm false
                }
              '';
            };
          }
          EOF

          echo "Testing comprehensive configuration..."
          nix eval --file test-comprehensive-config.nix --show-trace

          echo "✅ Complex configuration tests passed"

  test-actions-library:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Setup Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Test actions library
        run: |
          echo "Testing actions library..."

          # Test that the actions library is available and works
          cat > test-actions.nix << 'EOF'
          { config, pkgs, ... }:
          {
            programs.niri = {
              enable = true;
              settings = {
                binds = with config.lib.niri.actions; {
                  # Test basic actions
                  "Mod+Return".action = spawn "alacritty";
                  "Mod+Q".action = close_window;
                  "Mod+F".action = fullscreen_window;

                  # Test navigation actions
                  "Mod+H".action = focus_column_left;
                  "Mod+L".action = focus_column_right;
                  "Mod+J".action = focus_window_down;
                  "Mod+K".action = focus_window_up;

                  # Test workspace actions
                  "Mod+1".action = focus_workspace 1;
                  "Mod+2".action = focus_workspace 2;

                  # Test monitor actions
                  "Mod+Shift+H".action = focus_monitor_left;
                  "Mod+Shift+L".action = focus_monitor_right;

                  # Test system actions
                  "Print".action = screenshot;
                  "Mod+Shift+E".action = quit;
                  "F11".action = toggle_debug_tint;
                };
              };
            };
          }
          EOF

          echo "Testing actions library..."
          nix eval --file test-actions.nix --show-trace

          echo "✅ Actions library tests passed"