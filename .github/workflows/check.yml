name: Check & Test

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Setup Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Check flake
        run: nix flake check --show-trace

      - name: Build generator
        run: nix build .#generator --show-trace

      - name: Build module
        run: nix build .#niri-module --show-trace

      - name: Test module evaluation
        run: |
          # Test that the module can be imported and evaluated
          nix eval .#homeManagerModules.niri --show-trace

      - name: Validate example configurations
        run: |
          # Test example configurations can be evaluated
          for example in examples/*.nix; do
            echo "Testing $example..."
            nix eval --file "$example" --show-trace
          done

  format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Setup Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Check formatting
        run: |
          # Check Nix formatting
          if command -v nixfmt &> /dev/null; then
            echo "Checking Nix formatting..."
            find . -name "*.nix" -not -path "./result*" -exec nixfmt --check {} \;
          else
            echo "nixfmt not available, skipping format check"
          fi

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Setup Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Run statix (Nix linter)
        run: |
          if nix shell nixpkgs#statix -c statix --version &> /dev/null; then
            echo "Running statix linting..."
            nix shell nixpkgs#statix -c statix check .
          else
            echo "statix not available, skipping lint check"
          fi

      - name: Run deadnix (dead code detection)
        run: |
          if nix shell nixpkgs#deadnix -c deadnix --version &> /dev/null; then
            echo "Running deadnix..."
            nix shell nixpkgs#deadnix -c deadnix --fail .
          else
            echo "deadnix not available, skipping dead code check"
          fi